name: flu_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0' # Ajustado a versiones actuales y estables

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^14.0.0
  # mapbox_maps_flutter: ^2.23.1
  mapbox_maps_flutter: 2.20.0 # Versión estable conocida
  pie_chart: ^5.4.0
  socket_io_client: ^2.0.2

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.0 # Versión estable para proyectos actuales
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  # No olvides añadir la sección de assets si vas a usar el icono:
  assets:
    - assets/icon/icon.png
